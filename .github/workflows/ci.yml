name: CI Pipeline

on:
   push:
      branches:
            - develop
            - main
jobs:
      build:
            runs-on: ubuntu-latest

            steps:

                  - name: Checkout Code
                    uses: actions/checkout@v3
                  
                  - name: Setup Node
                    uses: actions/setup-node@v3
                    with:
                        node-version: '18.x'
                        cache: 'npm'
                  
                  - name: Install Dependencies
                    run: npm ci

                  - name: Run Linter
                    run: npm run lint